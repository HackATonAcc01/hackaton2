<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Многонациональная Самара</title>
    <!-- Исправленная ссылка на Bootstrap -->
    <link rel="stylesheet" href="https://bootstrapcdn.com">
    <link rel="stylesheet" type="text/css" href="../static/css/style.css"/>

    <style>
        h3 {
            padding-top: 10%;
            font-family: tt_norms;
        }
    </style>


</head>
<body>

    <nav>
        <h1>Многонациональная Самара</h1>
        <div id="profile">
            <h2 id="profilelabel" style="margin:0; font-size: 1.2rem; color: #007bff;">Войти</h2>
            <div id="options">
                               <br>
				<a href="/edit" id="f">Ред. <br>профиль</a>
				<br>
				<a href="/liked" id="s">Избранные<br> точки</a>
				<br>
				<a href="/logout" id="t">Выйти</a>

            </div>
        </div>
    </nav>

    <div class="container">
        <div class="route-container">
            <div class="route-card" id="card1">
                <img src="/static/img/Goncharov_House,_Ulyanovsk-1.jpg" style="width:auto; height: 70%; object-fit: cover;">
                <h3>Литературное Поволжье</h3>
            </div>

            <div class="route-card" id="card2">
                <img src="/static/img/Tupolev_Tu-144,_Ulyanovsk_Aircraft_Museum.jpg" style="width:auto; height: 70%; object-fit: cover;">
                <h3>Космос и техника Поволжья</h3>
            </div>

            <div class="route-card" id="card3">
                <img src="/static/img/Белогорский_Свято-Николаевский_православно-миссионерский_мужской_монастырь.jpg" style="width:auto; height: 70%; object-fit: cover;">

                <h3>Духовное Поволжье</h3>
            </div>

            <div class="route-card" id="card4">
                <img src="/static/img/Вид_на_Нижегородский_кремль_с_высоты_cropped.jpg" style="width:auto; height: 70%; object-fit: cover;">

                <h3>Крепости и оборона Поволжья</h3>
            </div>

            <div class="route-card" id="card5">
                <img src="/static/img/NN-16-05-2022_41.jpg" style="width:auto; height: 70%; object-fit: cover;">

                <h3>Купеческое Поволжье</h3>
            </div>

            <div class="route-card" id="card6">
                <img src="/static/img/По_гротам_пещеры_1.jpg" style="width:auto; height: 70%; object-fit: cover;">

                <h3>Природное Поволжье</h3>
            </div>
        </div>
    </div>
    <script src="/static/scripts/main.js"></script>
</body>
</html>
